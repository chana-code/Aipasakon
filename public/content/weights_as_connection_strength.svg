<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">โครงข่ายนิวรอนเล็กๆ ข้อมูลเข้า 3 จุด ต่อไปนิวรอนชั้นใน 3 จุด แล้วไปผลลัพธ์ เส้นที่หนาและมีสีคือ weight สูง เส้นจางคือ weight ต่ำ</desc>

