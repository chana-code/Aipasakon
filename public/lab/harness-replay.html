<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Harness Replay — watch the loop tick</title>
<style>
  /* ============================ Calm Textbook tokens ======================== */
  :root{
    --bg:#f7f4ee;            /* warm off-white page */
    --bg-soft:#fbf9f4;
    --card:#ffffff;
    --ink:#2b2620;          /* near-black warm */
    --ink-soft:#6b6357;
    --ink-faint:#9a9183;
    --line:#e7e1d6;
    --line-soft:#efeae0;
    --accent:#8a6d3b;       /* muted ochre */
    --accent-soft:#f0e7d6;

    /* actor accents */
    --user:#3f6f5b;         /* calm green */
    --user-soft:#e6efe9;
    --model:#5a6caf;        /* calm indigo */
    --model-soft:#e8ebf6;
    --harness:#a06a4a;      /* warm clay */
    --harness-soft:#f3e8de;

    --shadow:0 1px 2px rgba(40,34,24,.04), 0 8px 24px rgba(40,34,24,.06);
    --radius:14px;
    --maxstage:62ch;
    --font:-apple-system, BlinkMacSystemFont, "Sukhumvit Set", "Noto Sans Thai", "Segoe UI", system-ui, Roboto, sans-serif;
    --mono:"SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font); font-size:16px; line-height:1.6;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; flex-direction:column; min-height:100vh;
  }
  button{font-family:inherit}

  /* focus rings */
  :focus-visible{outline:2px solid var(--model); outline-offset:2px; border-radius:6px}

  /* ============================ Header ===================================== */
  header.top{
    padding:22px 26px 18px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,var(--bg-soft),var(--bg));
  }
  header.top h1{
    margin:0; font-size:22px; font-weight:680; letter-spacing:-.01em;
  }
  header.top .sub{ margin:5px 0 0; color:var(--ink-soft); font-size:13.5px; }
  header.top .sub b{color:var(--ink); font-weight:600}

  .lens{ display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
  .lens button{
    border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
    padding:6px 13px; border-radius:999px; font-size:12.5px; cursor:pointer;
    transition:all .16s ease;
  }
  .lens button:hover{border-color:var(--accent); color:var(--ink)}
  .lens button[aria-pressed="true"]{
    background:var(--ink); color:#fff; border-color:var(--ink);
  }

  /* ============================ Main grid ================================== */
  .grid{
    flex:1; display:grid;
    grid-template-columns: 300px minmax(0,1fr) 320px;
    gap:0; min-height:0; overflow:hidden;
  }
  .col{ min-height:0; display:flex; flex-direction:column; overflow:hidden; }
  .col.left{ border-right:1px solid var(--line); }
  .col.right{ border-left:1px solid var(--line); background:var(--bg-soft); }
  .col-head{
    padding:13px 18px 10px; font-size:11px; letter-spacing:.09em;
    text-transform:uppercase; color:var(--ink-faint); font-weight:700;
    border-bottom:1px solid var(--line-soft); flex:0 0 auto;
  }
  .col-body{ overflow-y:auto; padding:8px 0; flex:1 1 auto; }

  /* mobile tabs (hidden on desktop) */
  .tabbar-m{ display:none; }

  /* ============================ Timeline (left) =========================== */
  .turn-group{ margin:2px 0 6px; }
  .turn-label{
    padding:10px 18px 4px; font-size:11px; font-weight:700; letter-spacing:.05em;
    color:var(--ink-faint); text-transform:uppercase;
  }
  .ev-row{
    display:flex; align-items:flex-start; gap:9px; width:100%;
    padding:7px 16px 7px 14px; border:0; background:none; cursor:pointer;
    text-align:left; color:var(--ink-soft); border-left:3px solid transparent;
    transition:background .14s ease, opacity .2s ease, transform .2s ease;
  }
  .ev-row:hover{ background:var(--bg-soft); }
  .ev-row.current{
    background:var(--accent-soft); border-left-color:var(--accent);
    color:var(--ink);
  }
  .ev-row.dim{ opacity:.32; }
  .ev-glyph{
    flex:0 0 auto; width:22px; height:22px; border-radius:6px;
    display:grid; place-items:center; font-size:11px; font-weight:700;
    margin-top:1px; color:#fff;
  }
  .ev-main{ min-width:0; flex:1 1 auto; }
  .ev-label{
    font-size:12.5px; line-height:1.35; overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .ev-row.current .ev-label{ font-weight:600; }
  .ev-dots{ display:flex; gap:3px; margin-top:4px; flex-wrap:wrap; }
  .dot{ width:7px; height:7px; border-radius:50%; }

  /* ============================ Stage (center) ============================ */
  .stage-wrap{ overflow-y:auto; flex:1; padding:34px 30px 40px; }
  .stage{
    max-width:var(--maxstage); margin:0 auto;
    transition:opacity .2s ease, transform .2s ease;
  }
  .stage.swap{ opacity:0; transform:translateY(8px); }

  .role-line{ display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .role-badge{
    display:inline-flex; align-items:center; gap:7px;
    padding:5px 12px 5px 9px; border-radius:999px; font-size:12px; font-weight:650;
  }
  .role-badge .ic{ width:18px;height:18px;border-radius:5px;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800 }
  .role-user{ background:var(--user-soft); color:#2c5042 } .role-user .ic{background:var(--user)}
  .role-model{ background:var(--model-soft); color:#3a4682 } .role-model .ic{background:var(--model)}
  .role-harness{ background:var(--harness-soft); color:#7a4a2e } .role-harness .ic{background:var(--harness)}
  .type-pill{
    font-size:11px; letter-spacing:.05em; text-transform:uppercase; font-weight:700;
    color:var(--ink-faint); border:1px solid var(--line); padding:4px 10px; border-radius:999px;
  }
  .parallel-flag{
    font-size:11.5px; font-weight:650; color:var(--accent);
    background:var(--accent-soft); border:1px solid #e3d4b6;
    padding:4px 11px; border-radius:999px;
  }

  .stage h2{
    font-size:25px; line-height:1.25; letter-spacing:-.015em; margin:0 0 16px;
    font-weight:680;
  }
  .content-block{
    font-size:16.5px; line-height:1.72; color:var(--ink); margin:0 0 22px;
  }
  .tool-chip{
    display:inline-block; font-family:var(--mono); font-size:13px;
    background:#2b2620; color:#f3ead7; padding:4px 11px; border-radius:7px;
    margin-bottom:20px; letter-spacing:.01em;
  }

  /* teaching callout — the most important block */
  .callout{
    position:relative; background:#fffdf7; border:1px solid #ecdfbd;
    border-left:4px solid var(--accent); border-radius:12px;
    padding:18px 20px 18px 22px; margin:6px 0 22px; box-shadow:var(--shadow);
  }
  .callout .k{
    font-size:10.5px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--accent); font-weight:800; margin-bottom:7px; display:flex; align-items:center; gap:7px;
  }
  .callout .k::before{ content:"◆"; font-size:9px; }
  .callout p{ margin:0; font-size:15.5px; line-height:1.66; color:#4a4233; }

  .tagrow{ display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
  .tag{
    position:relative; font-size:11.5px; font-weight:650; padding:4px 11px;
    border-radius:999px; cursor:help; border:1px solid transparent; white-space:nowrap;
  }
  .tag .tip{
    position:absolute; bottom:calc(100% + 9px); left:50%; transform:translateX(-50%) translateY(4px);
    background:#2b2620; color:#f5efe2; font-weight:400; font-size:12px; line-height:1.45;
    padding:9px 12px; border-radius:9px; width:230px; max-width:64vw;
    opacity:0; pointer-events:none; transition:opacity .15s ease, transform .15s ease;
    z-index:30; box-shadow:0 8px 26px rgba(40,34,24,.22); text-align:left;
  }
  .tag .tip::after{
    content:""; position:absolute; top:100%; left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:#2b2620;
  }
  .tag:hover .tip, .tag:focus-visible .tip{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ============================ State panel (right) ======================= */
  .panel-sec{ padding:16px 18px; border-bottom:1px solid var(--line-soft); }
  .panel-sec h3{
    margin:0 0 11px; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink-faint); font-weight:700;
  }
  .ctx-meter{ height:13px; border-radius:7px; background:#e9e2d4; overflow:hidden; }
  .ctx-fill{
    height:100%; border-radius:7px;
    background:linear-gradient(90deg,#bfa46a,#8a6d3b);
    width:0%; transition:width .45s cubic-bezier(.4,0,.2,1);
  }
  .ctx-cap{ display:flex; justify-content:space-between; margin-top:7px; font-size:12px; color:var(--ink-soft); }
  .ctx-cap b{ color:var(--ink); font-variant-numeric:tabular-nums; }

  .stats{ display:flex; gap:10px; }
  .stat{
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:11px;
    padding:12px 13px; transition:background .3s ease, border-color .3s ease;
  }
  .stat .n{ font-size:24px; font-weight:720; line-height:1; font-variant-numeric:tabular-nums; }
  .stat .l{ font-size:11px; color:var(--ink-soft); margin-top:5px; }
  .stat.flash{ animation:flash .7s ease; }
  @keyframes flash{
    0%{ background:#fbf2d9; border-color:var(--accent); }
    100%{ background:var(--card); border-color:var(--line); }
  }

  .subs{ list-style:none; margin:0; padding:0; }
  .sub{
    padding:10px 11px; border-radius:10px; margin-bottom:7px;
    border:1px solid transparent; transition:all .25s ease;
  }
  .sub .sl{ font-size:13px; font-weight:650; color:var(--ink-soft); display:flex; align-items:center; gap:8px; }
  .sub .sl::before{ content:""; width:8px; height:8px; border-radius:50%; background:var(--line); flex:0 0 auto; transition:background .25s; }
  .sub .sb{ font-size:11.5px; color:var(--ink-faint); margin-top:4px; line-height:1.45; }
  .sub.on{
    background:var(--accent-soft); border-color:#e3d4b6;
  }
  .sub.on .sl{ color:var(--ink); }
  .sub.on .sl::before{ background:var(--accent); }
  .sub.on .sb{ color:#6f6450; }

  /* ============================ Player bar ================================ */
  .player{
    flex:0 0 auto; border-top:1px solid var(--line);
    background:rgba(251,249,244,.92); backdrop-filter:saturate(1.2) blur(6px);
    padding:10px 22px; display:flex; align-items:center; gap:14px;
  }
  .pbtns{ display:flex; align-items:center; gap:4px; }
  .pbtn{
    width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); cursor:pointer; font-size:14px;
    display:grid; place-items:center; transition:all .14s ease;
  }
  .pbtn:hover{ border-color:var(--accent); background:#fff; }
  .pbtn:active{ transform:translateY(1px); }
  .pbtn.play{ width:46px; height:46px; background:var(--ink); color:#fff; border-color:var(--ink); font-size:16px; }
  .pbtn.play:hover{ background:#1f1b15; }

  .scrub-wrap{ flex:1; display:flex; align-items:center; gap:12px; min-width:0; }
  .pos{ font-size:13px; color:var(--ink-soft); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .pos b{ color:var(--ink); }
  .scrub{
    flex:1; height:8px; border-radius:6px; background:#e3dccc; position:relative;
    cursor:pointer; min-width:90px;
  }
  .scrub-prog{ position:absolute; inset:0 auto 0 0; background:var(--accent); border-radius:6px; width:0%; transition:width .2s ease; }
  .scrub-knob{
    position:absolute; top:50%; width:16px; height:16px; border-radius:50%;
    background:#fff; border:2px solid var(--accent); transform:translate(-50%,-50%);
    left:0%; box-shadow:0 1px 4px rgba(0,0,0,.18); transition:left .2s ease;
  }
  .speed{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:10px; padding:8px 13px; font-size:13px; font-weight:650; cursor:pointer;
    transition:all .14s ease; white-space:nowrap;
  }
  .speed:hover{ border-color:var(--accent); }

  /* connector line for parallel siblings in timeline */
  .ev-row.sibling{ box-shadow:inset 3px 0 0 #d8c79c; }

  /* ============================ Responsive =============================== */
  @media (max-width: 900px){
    .grid{ display:flex; flex-direction:column; overflow:visible; }
    body{ overflow:auto; }
    .col.left, .col.right{ border:0; }
    /* stage always first */
    .col.center{ order:1; border-bottom:1px solid var(--line); }
    .tabbar-m{ order:2; }
    .col.left{ order:3; }
    .col.right{ order:3; }
    .stage-wrap{ padding:24px 18px 30px; max-height:none; }

    .tabbar-m{
      display:flex; gap:6px; padding:12px 16px 0;
    }
    .tabbar-m button{
      flex:1; border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
      padding:9px; border-radius:10px 10px 0 0; font-size:12.5px; font-weight:650; cursor:pointer;
    }
    .tabbar-m button[aria-pressed="true"]{ background:var(--ink); color:#fff; border-color:var(--ink); }

    /* tab-controlled visibility (default to state visible) */
    body.mtab-timeline #statecol{ display:none; }
    body.mtab-timeline .col.left{ display:flex; }
    body.mtab-state    .col.left{ display:none; }
    body.mtab-state    #statecol{ display:flex; }
    /* fallback when no class yet → show state */
    body:not(.mtab-timeline):not(.mtab-state) .col.left{ display:none; }

    .col-body{ max-height:48vh; }
    .player{ flex-wrap:wrap; gap:10px; }
    .scrub-wrap{ order:3; flex-basis:100%; }
  }
  @media (max-width: 560px){
    header.top h1{ font-size:18px; }
    .stage h2{ font-size:21px; }
    .pbtn{ width:34px; height:34px; }
    .pbtn.play{ width:42px; height:42px; }
    .speed{ padding:8px 10px; }
  }
  .visually-hidden{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); border:0; }

  /* ============================ Help button ============================== */
  .help-btn{
    margin-left:auto; width:30px; height:30px; border-radius:50%;
    border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
    font-size:15px; font-weight:700; cursor:pointer; flex:0 0 auto;
    transition:all .14s ease;
  }
  .help-btn:hover{ border-color:var(--accent); color:var(--ink); }
  .lang-btn{
    height:30px; min-width:42px; border-radius:999px;
    border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
    font-size:12.5px; font-weight:700; cursor:pointer; flex:0 0 auto; padding:0 12px;
    transition:all .14s ease;
  }
  .lang-btn:hover{ border-color:var(--accent); color:var(--ink); }

  /* ============================ Jump bar ================================= */
  .jumpbar{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:11px 26px; border-bottom:1px solid var(--line-soft);
    background:var(--bg-soft);
  }
  .jumpbar .jl{
    font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink-faint); font-weight:700; margin-right:2px;
  }
  .jchip{
    display:inline-flex; align-items:center; gap:6px;
    border:1px solid var(--line); background:var(--card); color:var(--ink-soft);
    padding:5px 11px; border-radius:999px; font-size:12px; cursor:pointer;
    transition:all .14s ease; white-space:nowrap;
  }
  .jchip:hover{ border-color:var(--accent); color:var(--ink); background:#fff; }
  .jchip .jdot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .jchip .jn{ font-size:10.5px; color:var(--ink-faint); font-variant-numeric:tabular-nums; }

  /* ============================ Loop strip ============================== */
  .loopstrip{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    margin-bottom:20px; padding-bottom:18px; border-bottom:1px dashed var(--line);
  }
  .lp-ctx{
    font-size:11.5px; font-weight:700; padding:4px 11px; border-radius:999px;
    color:#fff; letter-spacing:.02em;
  }
  .lp-ctx.boot{ background:var(--harness); }
  .lp-ctx.input{ background:var(--user); }
  .lp-ctx.respond{ background:var(--model); }
  .lp-ctx.harness{ background:var(--harness); }
  .lp-node{
    font-size:12px; font-weight:650; padding:5px 13px; border-radius:999px;
    border:1px solid var(--line); color:var(--ink-faint); background:var(--card);
    transition:all .25s ease;
  }
  .lp-node.on{
    color:#fff; background:var(--model); border-color:var(--model);
    box-shadow:0 2px 8px rgba(90,108,175,.28); transform:translateY(-1px);
  }
  .lp-arw{ color:var(--ink-faint); font-size:13px; }
  .lp-loop{
    margin-left:4px; font-size:11px; color:var(--ink-faint); font-weight:600;
    display:inline-flex; align-items:center; gap:4px;
  }

  /* ============================ Intro overlay =========================== */
  .overlay{
    position:fixed; inset:0; z-index:100; display:grid; place-items:center;
    background:rgba(40,34,24,.42); backdrop-filter:blur(3px);
    padding:24px; opacity:1; transition:opacity .25s ease;
  }
  .overlay.hide{ opacity:0; pointer-events:none; }
  .intro{
    background:var(--card); border-radius:18px; max-width:600px; width:100%;
    max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(40,34,24,.34);
    padding:30px 32px 26px;
  }
  .intro h2{ margin:0 0 6px; font-size:23px; font-weight:700; letter-spacing:-.01em; }
  .intro .lead{ margin:0 0 20px; color:var(--ink-soft); font-size:15px; line-height:1.6; }
  .intro h3{
    margin:20px 0 9px; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink-faint); font-weight:700;
  }
  .legend-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px 18px; }
  .lg{ display:flex; align-items:flex-start; gap:9px; font-size:13px; line-height:1.4; color:var(--ink-soft); }
  .lg .swatch{ width:20px; height:20px; border-radius:6px; flex:0 0 auto; display:grid; place-items:center; color:#fff; font-size:10px; font-weight:800; margin-top:1px; }
  .lg b{ color:var(--ink); font-weight:600; }
  .intro .loop-explain{
    background:var(--bg-soft); border:1px solid var(--line-soft); border-radius:12px;
    padding:14px 16px; margin:4px 0 4px; font-size:14px; line-height:1.6; color:var(--ink);
  }
  .intro .loop-explain b{ color:var(--model); }
  .intro-start{
    margin-top:24px; width:100%; border:0; background:var(--ink); color:#fff;
    padding:13px; border-radius:12px; font-size:15px; font-weight:650; cursor:pointer;
    transition:background .14s ease;
  }
  .intro-start:hover{ background:#1f1b15; }
  @media (max-width:560px){ .legend-grid{ grid-template-columns:1fr; } .intro{ padding:24px 20px; } }

  /* ============================ Text-in / text-out flow ================== */
  :root{
    --in:#2c7a86;     --in-soft:#dcedf0;   --in-ink:#1d5a64;
    --out:#b9802b;    --out-soft:#f6ead0;  --out-ink:#7d5414;
    --flowh:#9a8f7d;  --flowh-soft:#ece7dd;--flowh-ink:#6b6357;
  }
  .flow-badge{
    display:inline-flex; align-items:center; gap:9px;
    padding:7px 14px 7px 11px; border-radius:11px; font-weight:750; font-size:13px;
    line-height:1.1;
  }
  .flow-badge .fic{ font-size:16px; line-height:1; }
  .flow-badge .fstack{ display:flex; flex-direction:column; gap:1px; }
  .flow-badge .fsub{ font-weight:500; font-size:10.5px; opacity:.82; letter-spacing:.01em; }
  .flow-in{ background:var(--in-soft); color:var(--in-ink); }
  .flow-out{ background:var(--out-soft); color:var(--out-ink); }
  .flow-harness{ background:var(--flowh-soft); color:var(--flowh-ink); }

  /* timeline gets a flow-coloured left rail so the IN/OUT rhythm is visible */
  .ev-row{ border-left-width:3px; }
  /* keep the flow rail even on the current row; current = background highlight */
  .ev-row.current{ border-left-color:inherit; }

  /* tiny IN/OUT tick on each timeline row */
  .flow-tick{
    font-size:9px; font-weight:800; letter-spacing:.04em; padding:1px 5px;
    border-radius:5px; margin-left:6px; vertical-align:middle;
  }
  .flow-tick.in{ background:var(--in-soft); color:var(--in-ink); }
  .flow-tick.out{ background:var(--out-soft); color:var(--out-ink); }
  .flow-tick.harness{ background:var(--flowh-soft); color:var(--flowh-ink); }

  /* the "everything is text" explainer chips in the intro */
  .io-explain{ display:flex; gap:10px; margin:10px 0 2px; flex-wrap:wrap; }
  .io-chip{
    flex:1 1 0; min-width:150px; border-radius:12px; padding:12px 14px;
    border:1px solid; font-size:13px; line-height:1.45;
  }
  .io-chip b{ display:block; font-size:13.5px; margin-bottom:3px; }
  .io-chip.in{ background:var(--in-soft); border-color:#bcdade; color:var(--in-ink); }
  .io-chip.out{ background:var(--out-soft); border-color:#e9d3a6; color:var(--out-ink); }

  /* ============================ v2 layout: timeline on top ================ */
  .grid{ grid-template-columns: minmax(0,1fr) 300px; }

  .timeline-top{
    flex:0 0 auto; border-bottom:1px solid var(--line); background:var(--bg-soft);
    padding:9px 16px; overflow-x:auto; overflow-y:hidden;
  }
  .tl-head{ font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); font-weight:700; margin-bottom:7px; }
  .tl-track{ display:flex; gap:7px; align-items:stretch; min-width:min-content; }
  .ev-chip{
    flex:0 0 auto; width:118px; border:1px solid var(--line); border-top:3px solid var(--line);
    background:var(--card); border-radius:9px; padding:6px 9px 7px; cursor:pointer;
    text-align:left; transition:all .14s ease; display:flex; flex-direction:column; gap:3px;
  }
  .ev-chip:hover{ border-color:var(--accent); }
  .ev-chip.current{ background:var(--accent-soft); border-color:var(--accent); box-shadow:0 2px 8px rgba(138,109,59,.18); }
  .ev-chip .cn{ font-size:10px; font-weight:700; color:var(--ink-faint); display:flex; align-items:center; gap:5px; }
  .ev-chip .ctick{ font-size:8.5px; font-weight:800; padding:0 4px; border-radius:4px; }
  .ev-chip .ctick.in{ background:var(--in-soft); color:var(--in-ink); }
  .ev-chip .ctick.out{ background:var(--out-soft); color:var(--out-ink); }
  .ev-chip .ctick.harness{ background:var(--flowh-soft); color:var(--flowh-ink); }
  .ev-chip .ct{ font-size:11px; line-height:1.3; color:var(--ink-soft); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .ev-chip.current .ct{ color:var(--ink); font-weight:600; }

  /* ============================ raw text block =========================== */
  .raw-wrap{ margin:2px 0 20px; }
  .raw-cap{
    display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700;
    color:var(--ink-soft); margin-bottom:7px;
  }
  .raw-cap .rdot{ font-size:13px; }
  .raw-box{
    font-family:var(--mono); font-size:13px; line-height:1.6; white-space:pre-wrap;
    word-break:break-word; background:#2b2620; color:#ede3cf; border-radius:11px;
    padding:15px 17px; border-left:4px solid var(--accent); box-shadow:var(--shadow);
    max-height:340px; overflow:auto;
  }
  .raw-box.in{ border-left-color:var(--in); }
  .raw-box.out{ border-left-color:var(--out); }

  /* ============================ right panel v2 =========================== */
  .panel-hint{ margin:9px 0 0; font-size:11.5px; color:var(--ink-faint); line-height:1.45; }
  .usedlist{ list-style:none; margin:0; padding:0; }
  .usedlist .used{
    display:flex; align-items:center; gap:9px; padding:9px 11px; margin-bottom:7px;
    border:1px solid var(--line); border-radius:10px; background:var(--card);
    font-size:13px; font-weight:600; color:var(--ink); animation:popin .3s ease;
  }
  .usedlist .used .uc{ width:20px; height:20px; border-radius:6px; background:var(--user); color:#fff; display:grid; place-items:center; font-size:11px; flex:0 0 auto; }
  .usedlist .empty{ font-size:12.5px; color:var(--ink-faint); padding:4px 2px; }
  @keyframes popin{ from{ opacity:0; transform:translateY(-4px);} to{ opacity:1; transform:none;} }
</style>
</head>
<body>
  <!-- ============ INTRO OVERLAY ============ -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="How to read this replay">
    <div class="intro" id="introBox"></div>
  </div>

  <header class="top">
    <div style="display:flex;align-items:flex-start;gap:14px">
      <div style="flex:1 1 auto;min-width:0">
        <h1 id="h1Title"></h1>
        <p class="sub" id="metaLine"></p>
      </div>
      <div style="display:flex;gap:8px;flex:0 0 auto;align-items:center">
        <button class="lang-btn" id="langBtn" aria-label="Switch language">EN</button>
        <button class="help-btn" id="helpBtn" aria-label="What is this? Show the guide" title="What is this?">?</button>
      </div>
    </div>
    <div class="lens" role="group" aria-label="Surface lens filter" style="display:none">
      <button data-lens="all" aria-pressed="true">All</button>
    </div>
  </header>

  <!-- ============ TIMELINE STRIP (top) ============ -->
  <div class="timeline-top" aria-label="Timeline of events">
    <div class="tl-head" id="headTimeline">Timeline</div>
    <div class="tl-track" id="timeline"></div>
  </div>

  <div class="grid">
    <!-- ============ STAGE ============ -->
    <section class="col center" aria-label="Current event">
      <div class="stage-wrap">
        <div class="stage" id="stage"></div>
      </div>
    </section>

    <!-- ============ RIGHT: harness state ============ -->
    <section class="col right" id="statecol" aria-label="Harness state">
      <div class="col-head" id="headState">Harness state</div>
      <div class="col-body">
        <div class="panel-sec">
          <h3><span id="lblCtx">Context window</span> <span id="ctxApprox" style="text-transform:none;letter-spacing:0;font-weight:400"></span></h3>
          <div class="ctx-meter"><div class="ctx-fill" id="ctxFill"></div></div>
          <div class="ctx-cap"><span id="lblFilling">filling up</span><span><b id="ctxNum">0</b>%</span></div>
          <p class="panel-hint" id="hintCtx"></p>
        </div>
      </div>
    </section>
  </div>

  <!-- ============ PLAYER BAR ============ -->
  <div class="player" role="group" aria-label="Replay controls">
    <div class="pbtns">
      <button class="pbtn" id="btnFirst" aria-label="First event" title="First (Home)">⏮</button>
      <button class="pbtn" id="btnBack"  aria-label="Previous event" title="Back (←)">◀</button>
      <button class="pbtn play" id="btnPlay" aria-label="Play" title="Play / pause (Space)">▶</button>
      <button class="pbtn" id="btnFwd"   aria-label="Next event" title="Forward (→)">▶</button>
      <button class="pbtn" id="btnLast"  aria-label="Last event" title="Last (End)">⏭</button>
    </div>
    <div class="scrub-wrap">
      <span class="pos"><b id="posCur">1</b> / <span id="posTot">0</span></span>
      <div class="scrub" id="scrub" role="slider" tabindex="0" aria-label="Seek through events"
           aria-valuemin="1" aria-valuenow="1" aria-valuemax="1">
        <div class="scrub-prog" id="scrubProg"></div>
        <div class="scrub-knob" id="scrubKnob"></div>
      </div>
    </div>
    <button class="speed" id="btnSpeed" aria-label="Playback speed">1×</button>
  </div>

<script src="trace-stocks.js"></script>
<script>
(function(){
  "use strict";

  /* ---- guard: trace must be present ---- */
  var TRACE = window.HARNESS_TRACE;
  if(!TRACE || !Array.isArray(TRACE.events) || !TRACE.events.length){
    document.getElementById("stage").innerHTML =
      "<p style='color:#a33'>Could not load trace.js — make sure it sits in the same folder as this file.</p>";
    return;
  }
  var EVENTS = TRACE.events;
  var META   = TRACE.meta || {};
  var SUBS   = TRACE.subsystems || [];

  /* =========================== i18n core ================================= */
  var LANG = "th";   // Thai is the default; toggle to "en"
  function tx(ev, field){ return ev[field+"_"+LANG] || ev[field+"_en"] || ev[field] || ""; }
  function tl(o, field){ return o[field+"_"+LANG] || o[field+"_en"] || o[field] || ""; }
  function U(k){ return (UI[LANG] && UI[LANG][k]) || k; }

  var UI = {
    th: {
      captured:"บันทึกเมื่อ", timeline:"ลำดับเหตุการณ์", harnessState:"สถานะเบื้องหลัง",
      contextWindow:"พื้นที่ความจำ", approx:"(ประมาณ)", filling:"กำลังเต็มขึ้น",
      workingSet:"เครื่องมือที่ใช้อยู่", toolsLoaded:"เครื่องมือที่โหลด", deferred:"ยังไม่โหลด พร้อมเรียก",
      subsystems:"ระบบย่อยที่เกี่ยวข้อง", whatsHappening:"เกิดอะไรขึ้นจริงๆ",
      parallelFlag:"⟂ ทำพร้อมกัน ในขั้นเดียว", firedWith:"⟂ ทำพร้อมกับ:",
      sessionBoot:"ระบบเริ่มทำงาน", turn:"รอบที่ ", jump:"กระโดดไป",
      tabTimeline:"ลำดับเหตุการณ์", tabState:"สถานะเบื้องหลัง",
      tickIn:"เข้า", tickOut:"ออก",
      loopThink:"คิด", loopAct:"ทำ", loopObserve:"สังเกต", loopRepeat:"↻ วนจนกว่าจะเสร็จ",
      toolsUsed:"เครื่องมือที่หยิบมาใช้แล้ว", usedEmpty:"ยังไม่ได้หยิบใช้เครื่องมือ",
      ctxHint:"ยิ่งโมเดลอ่านเยอะ พื้นที่ยิ่งเต็ม",
      rawIn:"ข้อความจริงที่ป้อนเข้าโมเดล", rawOut:"ข้อความจริงที่โมเดลเขียนออกมา", rawNeutral:"ข้อความจริง",
      langOther:"EN"
    },
    en: {
      captured:"captured", timeline:"Timeline", harnessState:"Harness state",
      contextWindow:"Context window", approx:"(approx.)", filling:"filling up",
      workingSet:"Working set", toolsLoaded:"Tools loaded", deferred:"Deferred (dormant)",
      subsystems:"Subsystems touched", whatsHappening:"What's really happening",
      parallelFlag:"⟂ parallel, fired in the same step", firedWith:"⟂ Fired together with:",
      sessionBoot:"Session boot", turn:"Turn ", jump:"Jump to",
      tabTimeline:"Timeline", tabState:"Harness state",
      tickIn:"IN", tickOut:"OUT",
      loopThink:"Think", loopAct:"Act", loopObserve:"Observe", loopRepeat:"↻ repeats until done",
      toolsUsed:"Tools used so far", usedEmpty:"no tools used yet",
      ctxHint:"the more the model reads, the fuller it gets",
      rawIn:"the actual text fed into the model", rawOut:"the actual text the model wrote", rawNeutral:"the actual text",
      langOther:"ไทย"
    }
  };

  // loop-strip contextual label (boot / human-input / harness / respond), by language
  var LP_CTX = {
    th:{ boot:"เริ่มระบบ", input:"คุณถาม", harness:"ระบบทำงาน", respond:"ตอบ" },
    en:{ boot:"Boot", input:"Human input", harness:"Harness acts", respond:"Respond" }
  };

  // event type → human label, by language
  var TYPE_LABEL = {
    th:{ "boot":"เริ่มระบบ","reminder":"เตือน","hook":"ฮุก","memory":"ความจำ","mcp":"ระบบ",
         "user-msg":"คุณถาม","reasoning":"คิด","tool-call":"เรียกเครื่องมือ","tool-result":"ผลกลับมา","reply":"ตอบ" },
    en:{ "boot":"boot","reminder":"reminder","hook":"hook","memory":"memory","mcp":"mcp",
         "user-msg":"user message","reasoning":"reasoning","tool-call":"tool call","tool-result":"tool result","reply":"reply" }
  };

  /* =========================== static maps =============================== */

  // tag → { colours, bilingual label + tooltip }
  var TAG_INFO = {
    "deferred-fetch": { c:"#5a6caf", bg:"#e8ebf6", label_th:"หยิบเครื่องมือ", label_en:"deferred fetch",
      t_th:"โหลดเครื่องมือมาตอนจะใช้ ตอนแรกรู้แค่ชื่อ พอจะใช้จริงถึงโหลดวิธีใช้เข้ามา",
      t_en:"A tool loaded on demand. Its name was known, now its full schema loads so the model can call it." },
    "parallel": { c:"#3f6f5b", bg:"#e6efe9", label_th:"ทำพร้อมกัน", label_en:"parallel",
      t_th:"เรียกเครื่องมือหลายอันในขั้นเดียว สิ่งที่ไม่เกี่ยวกันทำพร้อมกันได้ เร็วขึ้น ผลเหมือนเดิม",
      t_en:"Two or more tool calls fired in one step. Independent actions run at once, faster, same result." },
    "hook": { c:"#a06a4a", bg:"#f3e8de", label_th:"ฮุก", label_en:"hook",
      t_th:"สคริปต์ที่ระบบสั่งรันเองอัตโนมัติทุกครั้ง เป็นระบบที่ทำ ไม่ใช่โมเดล",
      t_en:"A hook script the harness runs automatically every time. The harness acting, not the model." },
    "reminder": { c:"#9a6b9a", bg:"#f0e6f0", label_th:"ระบบเตือน", label_en:"reminder",
      t_th:"ระบบแอบใส่ข้อความเตือนเข้าไป ดูเหมือนอยู่ในแชต แต่จริงๆ คือระบบกระตุ้นโมเดล",
      t_en:"The harness slips a reminder into the stream, looking in-chat but it's the harness nudging the model." },
    "memory": { c:"#8a6d3b", bg:"#f0e7d6", label_th:"โหลดความจำ", label_en:"memory",
      t_th:"ความจำถาวรถูกโหลดเข้ามา คือสิ่งที่ระบบจำเกี่ยวกับคุณและงานข้ามครั้ง",
      t_en:"Persistent memory loading in, what the agent learned about this user across sessions." },
    "human-pause": { c:"#b06a4a", bg:"#f6e6dd", label_th:"หยุดถามคน", label_en:"human pause",
      t_th:"โมเดลหยุดแล้วส่งคำถามกลับให้คนเลือก การรู้ว่าเมื่อไหร่ไม่ควรทำเอง ก็เป็นความสามารถอย่างหนึ่ง",
      t_en:"The agent stops and hands control back to the human. Knowing when not to act is part of agency." },
    "mcp-connect": { c:"#3f8a8a", bg:"#dff0f0", label_th:"ต่อคอนเนกเตอร์", label_en:"connector",
      t_th:"คอนเนกเตอร์ต่อเข้ามา คือการเชื่อมโมเดลเข้ากับแอปของคุณ โดยใช้สิทธิ์เท่าที่คุณมี",
      t_en:"A connector coming online, wiring the agent to one of your apps, inheriting your permissions." },
    "primary-source": { c:"#6b6357", bg:"#ece7dd", label_th:"ของจริง", label_en:"primary source",
      t_th:"เหตุการณ์นี้คือหลักฐานจริงว่าเบื้องหลังทำงานยังไง ไม่ได้แต่งขึ้น",
      t_en:"This event is itself evidence of how the harness works, captured live, not invented." }
  };

  // type → glyph letter + color (uses actor color where it reads better)
  var TYPE_GLYPH = {
    "boot":        { g:"⏻", col:"--harness" },
    "reminder":    { g:"!", col:"--harness" },
    "hook":        { g:"⚙", col:"--harness" },
    "memory":      { g:"◫", col:"--harness" },
    "mcp":         { g:"⇄", col:"--harness" },
    "user-msg":    { g:"›", col:"--user" },
    "reasoning":   { g:"~", col:"--model" },
    "tool-call":   { g:"▶", col:"--model" },
    "tool-result": { g:"◀", col:"--harness" },
    "reply":       { g:"✓", col:"--model" }
  };

  var ACTOR_INFO = {
    "user":    { cls:"role-user",    label:"User",    ic:"U" },
    "model":   { cls:"role-model",   label:"Model",   ic:"M" },
    "harness": { cls:"role-harness", label:"Harness", ic:"H" }
  };

  // event type → where it sits in the think → act → observe loop
  function loopPhase(ev){
    switch(ev.type){
      case "boot":        return { key:"boot",    ctxKey:"boot" };
      case "hook":
      case "reminder":
      case "memory":
      case "mcp":         return { key:"harness", ctxKey:"harness" };
      case "user-msg":    return { key:"input",   ctxKey:"input" };
      case "reasoning":   return { key:"think" };
      case "tool-call":   return { key:"act" };
      case "tool-result": return { key:"observe" };
      case "reply":       return { key:"respond", ctxKey:"respond" };
      default:            return { key:"" };
    }
  }

  // ---- TEXT IN / TEXT OUT classification ----
  // An LLM only ever reads text (IN) and produces text (OUT). Everything the
  // harness assembles becomes IN; the only things the MODEL generates are OUT.
  var FLOW_INFO = {
    "in":      { cls:"flow-in",      ic:"⬇", th:"ข้อความเข้า", en:"TEXT IN",  sub_th:"สิ่งที่โมเดลอ่าน", sub_en:"what the model reads" },
    "out":     { cls:"flow-out",     ic:"⬆", th:"ข้อความออก", en:"TEXT OUT", sub_th:"สิ่งที่โมเดลเขียนออกมา", sub_en:"what the model writes" },
    "harness": { cls:"flow-harness", ic:"⚙", th:"กลไกเบื้องหลัง", en:"HARNESS", sub_th:"ระบบที่ห่อหุ้มโมเดล", sub_en:"the machinery" }
  };
  function ioFlow(ev){
    switch(ev.type){
      // text the model READS (the harness puts all of this into the context window)
      case "boot": case "reminder": case "hook": case "memory":
      case "user-msg": case "tool-result":
        return "in";
      // text the model WRITES — the only thing an LLM actually produces
      case "reasoning": case "tool-call": case "reply":
        return "out";
      // pure machinery — not text the model reads or writes
      case "mcp":
      default:
        return "harness";
    }
  }

  // signature moments to expose as one-click jumps (only those present get a chip)
  var JUMP_DEFS = [
    { tag:"deferred-fetch", label_th:"หยิบเครื่องมือ",   label_en:"Deferred fetch" },
    { tag:"parallel",       label_th:"ทำพร้อมกัน",       label_en:"Parallel step" },
    { tag:"hook",           label_th:"ฮุกทำงาน",         label_en:"Hook fires" },
    { tag:"memory",         label_th:"โหลดความจำ",       label_en:"Memory load" },
    { tag:"reminder",       label_th:"ระบบเตือน",        label_en:"Harness nudge" },
    { tag:"human-pause",    label_th:"หยุดถามคน",        label_en:"Human pause" },
    { tag:"mcp-connect",    label_th:"ต่อคอนเนกเตอร์",   label_en:"Connector" }
  ];

  // derive touched subsystem(s) from an event — keys must match SUBS[].key
  function touchedSubs(ev){
    var s = {};
    function add(k){ s[k]=true; }
    // explicit per-event subsystems win (language-independent)
    if(Array.isArray(ev.subs) && ev.subs.length){
      ev.subs.forEach(add);
      return Object.keys(s);
    }
    var tags = ev.tags || [];
    var t = ev.type, tool = ev.tool || "";

    if(t==="boot")     { add("lifecycle"); add("instructions"); }
    if(t==="hook")     { add("lifecycle"); add("instructions"); }
    if(t==="reminder") { add("instructions"); }
    if(t==="memory")   { add("state"); }
    if(t==="mcp")      { add("lifecycle"); }

    if(tags.indexOf("memory")>=0)      add("state");
    if(tags.indexOf("hook")>=0)        add("lifecycle");
    if(tags.indexOf("reminder")>=0)    add("instructions");
    if(tags.indexOf("mcp-connect")>=0) add("lifecycle");
    if(tags.indexOf("human-pause")>=0) add("instructions");
    if(tags.indexOf("deferred-fetch")>=0) add("scope");
    if(tags.indexOf("parallel")>=0)    add("scope");

    if(tool==="Agent" || tool==="Task") add("scope");
    // verification: a write/bash side-effect, or honesty-flavoured reasoning
    if(t==="tool-result" && (tool==="Write" || tool==="Bash")) add("verification");
    if(t==="reasoning" && /verify|honest|stale|cutoff|primary source|don't trust|refuse/i.test((ev.content||"")+(ev.detail||""))) add("verification");
    // reading the project's STATUS / memory = state subsystem
    if(/STATUS\.md|MEMORY\.md/.test(ev.content||"")) add("state");

    return Object.keys(s);
  }

  /* =========================== build DOM ================================= */

  function renderMeta(){
    document.getElementById("metaLine").innerHTML =
      "<b>"+esc(META.engine||"")+"</b> · "+esc(U("captured"))+" "+esc(META.captured||"")+
      " · <span>"+esc(tl(META,"session"))+"</span>";
  }

  function setText(id,t){ var el=document.getElementById(id); if(el) el.textContent=t; }

  function applyChrome(){
    document.documentElement.setAttribute("lang", LANG);
    document.getElementById("h1Title").innerHTML = (LANG==="th")
      ? 'ดูเบื้องหลังว่า AI ทำงานยังไง <span style="color:var(--ink-faint);font-weight:400">ทีละขั้น</span>'
      : 'Harness Replay <span style="color:var(--ink-faint);font-weight:400">— watch the loop tick</span>';
    setText("headTimeline", U("timeline"));
    setText("headState", U("harnessState"));
    setText("lblCtx", U("contextWindow"));
    setText("lblFilling", U("filling"));
    setText("hintCtx", U("ctxHint"));
    var lb = document.getElementById("langBtn"); if(lb) lb.textContent = U("langOther");
  }

  document.getElementById("posTot").textContent = EVENTS.length;

  // index events by id for sibling lookup
  var byId = {};
  EVENTS.forEach(function(e){ byId[e.id]=e; });

  // --- TIMELINE (horizontal chip strip, rebuildable on language switch) ---
  var timelineEl = document.getElementById("timeline");
  var rowEls = [];   // index-aligned with EVENTS
  function rebuildTimeline(){
    timelineEl.innerHTML = "";
    rowEls = [];
    var frag = document.createDocumentFragment();
    EVENTS.forEach(function(ev, i){
      var fl = ioFlow(ev);
      var flcol = (fl==="in") ? "in" : (fl==="out") ? "out" : "harness";
      var chip = document.createElement("button");
      chip.className = "ev-chip";
      chip.setAttribute("aria-label", "Event "+(i+1)+": "+tx(ev,"label"));
      chip.style.borderTopColor = "var(--" + (fl==="in"?"in":fl==="out"?"out":"flowh") + ")";
      var tickTxt = (fl==="in") ? U("tickIn") : (fl==="out") ? U("tickOut") : "⚙";
      chip.innerHTML =
        "<span class='cn'>"+(i+1)+"<span class='ctick "+flcol+"'>"+esc(tickTxt)+"</span></span>"+
        "<span class='ct'>"+esc(tx(ev,"label"))+"</span>";
      chip.addEventListener("click", function(){ stop(); go(i); });
      frag.appendChild(chip);
      rowEls[i] = chip;
    });
    timelineEl.appendChild(frag);
    if(rowEls[cur]) rowEls[cur].classList.add("current");
  }

  // --- SUBSYSTEMS list (rebuildable) ---
  var subEls = {};
  function rebuildSubs(){
    var ul = document.getElementById("subsList");
    ul.innerHTML = "";
    subEls = {};
    SUBS.forEach(function(s){
      var li = document.createElement("li");
      li.className="sub";
      li.innerHTML = "<div class='sl'>"+esc(tl(s,"label"))+"</div><div class='sb'>"+esc(tl(s,"blurb"))+"</div>";
      ul.appendChild(li);
      subEls[s.key]=li;
    });
  }

  // --- JUMP BAR (rebuildable) ---
  function rebuildJumpbar(){
    var bar = document.getElementById("jumpbar");
    bar.innerHTML = "<span class='jl' id='lblJump'>"+esc(U("jump"))+"</span>";
    JUMP_DEFS.forEach(function(def){
      var idxs = [];
      EVENTS.forEach(function(ev,i){ if((ev.tags||[]).indexOf(def.tag)>=0) idxs.push(i); });
      if(!idxs.length) return;               // only chips for moments that occur
      var info = TAG_INFO[def.tag] || { c:"#6b6357" };
      var chip = document.createElement("button");
      chip.className = "jchip";
      chip.setAttribute("title", tl(info,"t") || tl(def,"label"));
      chip.innerHTML = "<span class='jdot' style='background:"+info.c+"'></span>"+
                       esc(tl(def,"label"))+" <span class='jn'>×"+idxs.length+"</span>";
      chip.addEventListener("click", function(){
        stop();
        var next = null;
        for(var k=0;k<idxs.length;k++){ if(idxs[k]>cur){ next=idxs[k]; break; } }
        if(next===null) next = idxs[0];
        go(next);
      });
      bar.appendChild(chip);
    });
  }

  /* =========================== state refs ================================ */
  var stageEl   = document.getElementById("stage");
  var ctxFill   = document.getElementById("ctxFill");
  var ctxNum    = document.getElementById("ctxNum");
  var ctxApprox = document.getElementById("ctxApprox");
  var numTools  = document.getElementById("numTools");
  var numDef    = document.getElementById("numDef");
  var statTools = document.getElementById("statTools");
  var statDef   = document.getElementById("statDef");
  var posCur    = document.getElementById("posCur");
  var scrubProg = document.getElementById("scrubProg");
  var scrubKnob = document.getElementById("scrubKnob");
  var scrubEl   = document.getElementById("scrub");
  var btnPlay   = document.getElementById("btnPlay");

  /* =========================== player state ============================== */
  var cur = 0;                 // current event index
  var playing = false;
  var timer = null;
  var speed = 1;               // 1 or 2
  var lens = "all";
  var BASE_MS = 2600;
  var PAUSE_MS = 4000;         // longer on human-pause
  var prevTools = null, prevDef = null;
  var firstRender = true;     // first stage paint is instant (no blank flash)

  /* =========================== render ==================================== */

  function lensMatch(ev){
    if(lens==="all") return true;
    if(lens==="core")   return ev.surface==="core";      // core lens: only shared-engine events full strength
    if(lens==="code")   return ev.surface==="core" || ev.surface==="code";
    if(lens==="cowork") return ev.surface==="core" || ev.surface==="cowork";
    return true;
  }

  function applyLensDim(){
    EVENTS.forEach(function(ev,i){
      var dim = !lensMatch(ev);
      rowEls[i].classList.toggle("dim", dim && lens!=="all");
    });
  }

  function renderStage(i){
    var ev = EVENTS[i];
    var actor = ACTOR_INFO[ev.actor] || ACTOR_INFO.harness;

    var html = "";

    // loop-phase strip: Think → Act → Observe, with contextual phase
    var ph = loopPhase(ev);
    html += "<div class='loopstrip'>";
    if(ph.ctxKey){ html += "<span class='lp-ctx "+ph.key+"'>"+esc((LP_CTX[LANG]||{})[ph.ctxKey]||"")+"</span>"; }
    html += "<span class='lp-node"+(ph.key==="think"?" on":"")+"'>"+esc(U("loopThink"))+"</span>";
    html += "<span class='lp-arw'>→</span>";
    html += "<span class='lp-node"+(ph.key==="act"?" on":"")+"'>"+esc(U("loopAct"))+"</span>";
    html += "<span class='lp-arw'>→</span>";
    html += "<span class='lp-node"+(ph.key==="observe"?" on":"")+"'>"+esc(U("loopObserve"))+"</span>";
    html += "<span class='lp-loop'>"+esc(U("loopRepeat"))+"</span>";
    html += "</div>";

    // TEXT IN / TEXT OUT — the headline classification, shown first (current language leads)
    var fl = ioFlow(ev), fi = FLOW_INFO[fl];
    var fPrimary = (LANG==="th") ? fi.th : fi.en;
    var fSecondary = (LANG==="th") ? fi.en : fi.th;
    var fSub = (LANG==="th") ? fi.sub_th : fi.sub_en;
    html += "<div class='role-line'>";
    html += "<span class='flow-badge "+fi.cls+"'><span class='fic'>"+fi.ic+"</span>"+
            "<span class='fstack'><span>"+esc(fPrimary)+" · "+esc(fSecondary)+"</span>"+
            "<span class='fsub'>"+esc(fSub)+"</span></span></span>";
    html += "<span class='role-badge "+actor.cls+"'><span class='ic'>"+actor.ic+"</span>"+esc(actor.label)+"</span>";
    html += "<span class='type-pill'>"+esc((TYPE_LABEL[LANG]&&TYPE_LABEL[LANG][ev.type])||ev.type)+"</span>";
    if(ev.group){
      html += "<span class='parallel-flag'>"+esc(U("parallelFlag"))+"</span>";
    }
    html += "</div>";

    html += "<h2>"+esc(tx(ev,"label"))+"</h2>";

    if(ev.tool){
      html += "<div class='tool-chip'>"+esc(ev.tool)+"</div>";
    }

    var _content = tx(ev,"content");
    if(_content){
      html += "<p class='content-block'>"+esc(_content)+"</p>";
    }

    // THE ACTUAL TEXT in/out of the model — the real machinery, not a description
    if(ev.raw){
      var rawLabel = (fl==="in") ? U("rawIn") : (fl==="out") ? U("rawOut") : U("rawNeutral");
      html += "<div class='raw-wrap'>"+
                "<div class='raw-cap'><span class='rdot'>📄</span>"+esc(rawLabel)+"</div>"+
                "<div class='raw-box "+fl+"'>"+esc(ev.raw)+"</div>"+
              "</div>";
    }

    var _detail = tx(ev,"detail");
    if(_detail){
      html += "<div class='callout'><div class='k'>"+esc(U("whatsHappening"))+"</div><p>"+esc(_detail)+"</p></div>";
    }

    if(ev.tags && ev.tags.length){
      html += "<div class='tagrow'>";
      ev.tags.forEach(function(tg){
        var info = TAG_INFO[tg];
        var c = info?info.c:"#6b6357", bg = info?info.bg:"#ece7dd";
        var lab = info? tl(info,"label") : tg;
        var tip = info? tl(info,"t") : tg;
        html += "<span class='tag' tabindex='0' style='color:"+c+";background:"+bg+";border-color:"+c+"33'>"+
                esc(lab)+"<span class='tip'>"+esc(tip)+"</span></span>";
      });
      html += "</div>";
    }

    if(ev.group){
      // list sibling labels sharing group + turn
      var sibs = EVENTS.filter(function(e){ return e.group===ev.group && e.turn===ev.turn && e.id!==ev.id; });
      if(sibs.length){
        html += "<p style='margin-top:18px;font-size:13px;color:var(--ink-faint)'>"+esc(U("firedWith"))+" "+
                sibs.map(function(s){ return "<b style='color:var(--ink-soft)'>"+esc(tx(s,"label"))+"</b>"; }).join(", ")+"</p>";
      }
    }

    // first paint is instant (no blank flash on open); later changes animate
    if(firstRender){
      firstRender = false;
      stageEl.innerHTML = html;
      stageEl.parentElement.scrollTop = 0;
      return;
    }
    // swap animation
    stageEl.classList.add("swap");
    setTimeout(function(){
      stageEl.innerHTML = html;
      stageEl.scrollTop = 0;
      stageEl.parentElement.scrollTop = 0;
      stageEl.classList.remove("swap");
    }, 130);
  }

  // friendly tool names → English (the trace stores Thai)
  var USED_EN = { "ค้นเว็บ":"web search", "เขียนไฟล์":"write file", "อ่านไฟล์":"read file", "หยิบเครื่องมือ":"load tool" };
  function usedLabel(name){ return (LANG==="en") ? (USED_EN[name]||name) : name; }

  function renderState(i){
    var st = (EVENTS[i].state) || {};
    var ctx = (typeof st.ctx==="number") ? st.ctx : 0;
    ctxFill.style.width = Math.max(0,Math.min(100,ctx))+"%";
    ctxNum.textContent = ctx;
    ctxApprox.textContent = st.approx ? U("approx") : "";
  }

  function flash(el){
    el.classList.remove("flash");
    // force reflow so re-adding restarts the animation
    void el.offsetWidth;
    el.classList.add("flash");
  }

  function renderTimeline(i){
    rowEls.forEach(function(r,idx){ r.classList.toggle("current", idx===i); });
    var row = rowEls[i];
    if(row && row.scrollIntoView){
      row.scrollIntoView({block:"nearest", inline:"center", behavior:"smooth"});
    }
  }

  function renderScrub(i){
    var pct = EVENTS.length>1 ? (i/(EVENTS.length-1))*100 : 0;
    scrubProg.style.width = pct+"%";
    scrubKnob.style.left = pct+"%";
    posCur.textContent = i+1;
    scrubEl.setAttribute("aria-valuenow", i+1);
    scrubEl.setAttribute("aria-valuemax", EVENTS.length);
    scrubEl.setAttribute("aria-valuetext", "Event "+(i+1)+" of "+EVENTS.length+": "+tx(EVENTS[i],"label"));
  }

  function go(i){
    i = Math.max(0, Math.min(EVENTS.length-1, i));  // bounds clamp
    cur = i;
    renderStage(i);
    renderState(i);
    renderTimeline(i);
    renderScrub(i);
  }

  /* =========================== playback ================================== */
  function curDelay(){
    var ev = EVENTS[cur];
    var base = (ev.tags && ev.tags.indexOf("human-pause")>=0) ? PAUSE_MS : BASE_MS;
    return base / speed;
  }

  function tick(){
    if(cur >= EVENTS.length-1){ stop(); return; }   // stop at last
    go(cur+1);
    if(playing){ timer = setTimeout(tick, curDelay()); }
  }

  function play(){
    if(cur >= EVENTS.length-1){ go(0); }   // restart from top if at end
    playing = true;
    btnPlay.textContent = "⏸";
    btnPlay.setAttribute("aria-label","Pause");
    timer = setTimeout(tick, curDelay());
  }
  function stop(){
    playing = false;
    if(timer){ clearTimeout(timer); timer=null; }
    btnPlay.textContent = "▶";
    btnPlay.setAttribute("aria-label","Play");
  }
  function toggle(){ playing ? stop() : play(); }

  /* =========================== controls ================================== */
  document.getElementById("btnFirst").addEventListener("click", function(){ stop(); go(0); });
  document.getElementById("btnLast").addEventListener("click", function(){ stop(); go(EVENTS.length-1); });
  document.getElementById("btnBack").addEventListener("click", function(){ stop(); go(cur-1); });
  document.getElementById("btnFwd").addEventListener("click", function(){ stop(); go(cur+1); });
  btnPlay.addEventListener("click", toggle);

  // speed toggle
  document.getElementById("btnSpeed").addEventListener("click", function(){
    speed = (speed===1) ? 2 : 1;
    this.textContent = speed+"×";
    // if playing, restart the pending timer at new speed
    if(playing && timer){ clearTimeout(timer); timer=setTimeout(tick, curDelay()); }
  });

  // lens filter
  Array.prototype.forEach.call(document.querySelectorAll(".lens button"), function(b){
    b.addEventListener("click", function(){
      lens = b.getAttribute("data-lens");
      Array.prototype.forEach.call(document.querySelectorAll(".lens button"), function(x){
        x.setAttribute("aria-pressed", x===b ? "true":"false");
      });
      applyLensDim();
    });
  });

  // mobile tabs — toggle a body class that CSS reads (only matters under 900px)
  document.body.classList.add("mtab-state");   // default: state panel shown
  Array.prototype.forEach.call(document.querySelectorAll(".tabbar-m button"), function(b){
    b.addEventListener("click", function(){
      var tab = b.getAttribute("data-tab");
      Array.prototype.forEach.call(document.querySelectorAll(".tabbar-m button"), function(x){
        x.setAttribute("aria-pressed", x===b ? "true":"false");
      });
      document.body.classList.toggle("mtab-timeline", tab==="timeline");
      document.body.classList.toggle("mtab-state",    tab==="state");
    });
  });

  /* ---- scrubber seek (click + drag) ---- */
  function seekFromClientX(clientX){
    var rect = scrubEl.getBoundingClientRect();
    var pct = (clientX - rect.left)/rect.width;
    pct = Math.max(0, Math.min(1, pct));
    var i = Math.round(pct*(EVENTS.length-1));
    go(i);
  }
  var dragging = false;
  scrubEl.addEventListener("pointerdown", function(e){
    stop(); dragging=true; scrubEl.setPointerCapture(e.pointerId);
    seekFromClientX(e.clientX);
  });
  scrubEl.addEventListener("pointermove", function(e){
    if(dragging) seekFromClientX(e.clientX);
  });
  scrubEl.addEventListener("pointerup", function(){ dragging=false; });
  scrubEl.addEventListener("keydown", function(e){
    if(e.key==="ArrowLeft" || e.key==="ArrowDown"){ e.preventDefault(); stop(); go(cur-1); }
    else if(e.key==="ArrowRight" || e.key==="ArrowUp"){ e.preventDefault(); stop(); go(cur+1); }
    else if(e.key==="Home"){ e.preventDefault(); stop(); go(0); }
    else if(e.key==="End"){ e.preventDefault(); stop(); go(EVENTS.length-1); }
  });

  /* ---- global keyboard ---- */
  document.addEventListener("keydown", function(e){
    // ignore while the intro overlay is open (Escape handled separately)
    var ov = document.getElementById("overlay");
    if(ov && !ov.classList.contains("hide")) return;
    // ignore if focus is in the scrubber (it has its own handler) or a text input
    var tag = (e.target.tagName||"").toLowerCase();
    if(e.target===scrubEl) return;
    if(tag==="input" || tag==="textarea") return;
    if(e.key==="ArrowLeft"){ e.preventDefault(); stop(); go(cur-1); }
    else if(e.key==="ArrowRight"){ e.preventDefault(); stop(); go(cur+1); }
    else if(e.key===" " || e.code==="Space"){ e.preventDefault(); toggle(); }
    else if(e.key==="Home"){ e.preventDefault(); stop(); go(0); }
    else if(e.key==="End"){ e.preventDefault(); stop(); go(EVENTS.length-1); }
  });

  /* =========================== util ====================================== */
  function esc(s){
    return String(s==null?"":s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  /* =========================== intro overlay ============================= */
  var overlay = document.getElementById("overlay");
  function closeIntro(){ overlay.classList.add("hide"); }
  function openIntro(){ stop(); overlay.classList.remove("hide"); }
  function startReplay(){ closeIntro(); go(0); play(); }

  function INTRO(lang){
    if(lang==="th"){
      return ''
        + '<h2>คุณกำลังดู AI ทำงานจริง เล่นซ้ำทีละขั้น</h2>'
        + '<p class="lead">ทุกขั้นด้านล่างเกิดขึ้นจริง จากงานที่ถาม Claude ว่า ช่วยค้นหุ้น AI แล้วเขียนลงไฟล์ กดเล่น หรือกดทีละขั้น เพื่อดูว่าเบื้องหลังจอแชต AI ทำอะไรบ้าง</p>'
        + '<div class="loop-explain">ไอเดียหลัก AI ไม่ได้แค่ตอบ แต่มันทำงานเป็น <b>ลูป</b> คือ <b>คิด</b> แล้ว <b>ทำ</b> โดยใช้เครื่องมือ แล้ว <b>สังเกต</b> ผลที่ได้ จากนั้นวนแบบนี้จนงานเสร็จ สิ่งที่คุณเห็นในแชตเป็นแค่ส่วนเล็ก ที่เหลือคือสิ่งนี้</div>'
        + '<h3>แนวคิดเดียวที่อธิบายทุกอย่าง</h3>'
        + '<p class="lead" style="margin-bottom:8px">โมเดลทำอยู่อย่างเดียว คือ อ่าน <b>ข้อความเข้า</b> แล้วสร้าง <b>ข้อความออก</b> ทุกอย่างที่ระบบทำ ก็เพื่อเตรียมข้อความเข้า และจัดการข้อความออก ให้ดูที่ป้ายสีบนแต่ละขั้น</p>'
        + '<div class="io-explain">'
        +   '<div class="io-chip in"><b>⬇ ข้อความเข้า</b>สิ่งที่โมเดล<i>อ่าน</i> คือ กฎของระบบ ประวัติแชต และผลจากเครื่องมือ ทั้งหมดถูกป้อนเข้าโมเดลเป็นข้อความ</div>'
        +   '<div class="io-chip out"><b>⬆ ข้อความออก</b>สิ่งที่โมเดล<i>เขียนออกมา</i> คือ ความคิด การสั่งใช้เครื่องมือ หรือคำตอบ นี่คือสิ่งเดียวที่โมเดลสร้างขึ้นจริง</div>'
        + '</div>'
        + '<h3>ใครเป็นคนทำ ดูที่สี</h3>'
        + '<div class="legend-grid">'
        +   '<div class="lg"><span class="swatch" style="background:var(--user)">U</span><span><b>คุณ</b> คนที่พิมพ์</span></div>'
        +   '<div class="lg"><span class="swatch" style="background:var(--model)">M</span><span><b>โมเดล</b> Claude ที่คิดและสั่งใช้เครื่องมือ</span></div>'
        +   '<div class="lg"><span class="swatch" style="background:var(--harness)">H</span><span><b>ระบบ</b> สิ่งที่ห่อหุ้มรอบโมเดล</span></div>'
        +   '<div class="lg"><span class="swatch" style="background:var(--accent)">◆</span><span><b>กล่องอธิบาย</b> บอกว่าเกิดอะไรขึ้นจริงๆ</span></div>'
        + '</div>'
        + '<h3>แผงต่างๆ บนจอ</h3>'
        + '<div class="legend-grid">'
        +   '<div class="lg"><span><b>แถบบน</b> ลำดับเหตุการณ์ทุกขั้น กดขั้นไหนก็กระโดดไปขั้นนั้น</span></div>'
        +   '<div class="lg"><span><b>กลาง</b> เหตุการณ์ปัจจุบัน พร้อมข้อความจริงที่เข้าออกโมเดล</span></div>'
        +   '<div class="lg"><span><b>ขวา</b> สถานะเบื้องหลัง พื้นที่ความจำที่เต็มขึ้น และเครื่องมือที่หยิบมาใช้</span></div>'
        + '</div>'
        + '<button class="intro-start" id="introStart">เริ่มดูการเล่นซ้ำ →</button>';
    }
    return ''
      + '<h2>You are watching a real AI session, replayed</h2>'
      + '<p class="lead">Every step below actually happened, from a real task: asking Claude to research AI stocks and write them to a file. Press play, or step through, to see what an AI agent really does behind the chat window.</p>'
      + '<div class="loop-explain">The big idea: an AI agent is not a reply, it is a <b>loop</b>. It <b>Thinks</b>, then <b>Acts</b> with a tool, then <b>Observes</b> the result, and repeats until the job is done. The chat bubble is the small visible part, this is the rest.</div>'
      + '<h3>The one idea that explains everything</h3>'
      + '<p class="lead" style="margin-bottom:8px">A model only ever does one thing: it reads <b>text in</b> and produces <b>text out</b>. The whole harness exists to assemble the text in and act on the text out. Watch the badge on each event.</p>'
      + '<div class="io-explain">'
      +   '<div class="io-chip in"><b>⬇ TEXT IN</b>what the model <i>reads</i>: the system rules, the chat history, tool results. All fed into the model as text.</div>'
      +   '<div class="io-chip out"><b>⬆ TEXT OUT</b>what the model <i>writes</i>: its thinking, a tool call, or an answer. The only thing the model actually produces.</div>'
      + '</div>'
      + '<h3>Who is acting (the colours)</h3>'
      + '<div class="legend-grid">'
      +   '<div class="lg"><span class="swatch" style="background:var(--user)">U</span><span><b>User</b>, the human typing.</span></div>'
      +   '<div class="lg"><span class="swatch" style="background:var(--model)">M</span><span><b>Model</b>, Claude thinking and calling tools.</span></div>'
      +   '<div class="lg"><span class="swatch" style="background:var(--harness)">H</span><span><b>Harness</b>, the system around the model.</span></div>'
      +   '<div class="lg"><span class="swatch" style="background:var(--accent)">◆</span><span><b>Callout</b>, what is really happening here.</span></div>'
      + '</div>'
      + '<h3>The panels</h3>'
      + '<div class="legend-grid">'
      +   '<div class="lg"><span><b>Top</b>, the timeline. Click any step to jump.</span></div>'
      +   '<div class="lg"><span><b>Centre</b>, the current event with the real text in/out.</span></div>'
      +   '<div class="lg"><span><b>Right</b>, the harness state: memory filling up and the tools used so far.</span></div>'
      + '</div>'
      + '<button class="intro-start" id="introStart">Start the replay →</button>';
  }
  function renderIntro(){
    document.getElementById("introBox").innerHTML = INTRO(LANG);
    document.getElementById("introStart").addEventListener("click", startReplay);
  }

  document.getElementById("helpBtn").addEventListener("click", openIntro);
  overlay.addEventListener("click", function(e){ if(e.target===overlay) closeIntro(); });
  document.addEventListener("keydown", function(e){
    if(e.key==="Escape" && !overlay.classList.contains("hide")){ closeIntro(); }
  });

  // language toggle (TH ⇄ EN)
  document.getElementById("langBtn").addEventListener("click", function(){
    LANG = (LANG==="th") ? "en" : "th";
    applyChrome();
    renderMeta();
    rebuildTimeline();
    renderIntro();
    go(cur);
  });

  /* =========================== boot ====================================== */
  applyChrome();
  renderMeta();
  rebuildTimeline();
  renderIntro();
  go(0);

})();
</script>
